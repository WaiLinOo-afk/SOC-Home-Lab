# inputs.conf - Kali Linux Universal Forwarder
# Place at: /opt/splunkforwarder/etc/system/local/inputs.conf
#
# NOTE: Kali uses systemd journald so there's no /var/log/auth.log or /var/log/syslog
# Using dpkg.log, apache2, and vmware-network.log as available sources

[monitor:///var/log/dpkg.log]
index = syslog
sourcetype = linux_logs

[monitor:///var/log/apache2]
index = syslog
sourcetype = apache_logs

[monitor:///var/log/vmware-network.log]
index = syslog
sourcetype = linux_logs
